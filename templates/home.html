{% extends "layout.html" %} {% block content %}
<div class="mb-10 space-y-2">
  <h1 class="text-3xl font-bold tracking-tight sm:text-4xl">Posts</h1>
  <p class="text-muted-foreground">Thoughts, tutorials, and updates.</p>
</div>

<div class="space-y-4">
  {% for post in posts %}
  <article class="post-card group">
    <a href="{{ url_for('posts.show', post_id=post.id) }}" class="block p-6">
      <div class="flex items-start gap-4">
        <div class="avatar avatar-lg">
          <img
            class="avatar-image"
            src="/static/profile_pics/default.jpg"
            alt="{{ post.author }}"
            width="48"
            height="48"
            loading="lazy"
          />
        </div>
        <div class="min-w-0 flex-1 space-y-3">
          <div class="post-meta">
            <span class="font-medium text-foreground">{{ post.author }}</span>
            <span aria-hidden="true">·</span>
            <time datetime="{{ post.date_created }}"
              >{{ post.date_created }}</time
            >
          </div>
          <h2 class="post-title">{{ post.title }}</h2>
          <p class="post-excerpt">{{ post.content }}</p>
          <div class="flex flex-wrap gap-1.5 pt-1">
            {% for tag in post.tags %}
            <span class="badge badge-secondary">{{ tag }}</span>
            {% endfor %}
          </div>
        </div>
      </div>
    </a>
  </article>
  {% endfor %}
</div>
{% endblock content %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{% block title %}FastAPI Blog{% endblock title %}</title>
    <meta
      name="description"
      content="{% block description %}A minimal blog built with FastAPI{% endblock description %}"
    />
    <meta name="author" content="Corey Schafer" />

    <meta
      property="og:title"
      content="{% block og_title %}FastAPI Blog{% endblock og_title %}"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="" />
    <meta property="og:image" content="" />
    <meta property="og:image:alt" content="" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" type="text/css" href="/static/css/main.css" />

    <meta
      name="theme-color"
      content="#fafafa"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#09090b"
      media="(prefers-color-scheme: dark)"
    />

    <link rel="icon" href="/static/icons/favicon.ico" sizes="any" />
    <link rel="icon" href="/static/icons/icon.svg" type="image/svg+xml" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/static/icons/icon.png"
    />
    <link rel="manifest" href="/static/site.webmanifest" />
  </head>

  <body class="flex min-h-svh flex-col">
    <header class="site-header">
      <div class="container-page flex h-14 items-center justify-between">
        <div class="flex items-center gap-6">
          <a
            href="{{ url_for('posts.index') }}"
            class="flex items-center gap-2 font-semibold tracking-tight"
          >
            <span
              class="flex size-7 items-center justify-center rounded-md bg-primary text-xs font-bold text-primary-foreground"
              >B</span
            >
            <span class="hidden sm:inline">Blog</span>
          </a>
          <nav class="hidden items-center gap-4 md:flex">
            <a
              class="nav-link nav-link-active"
              href="{{ url_for('posts.index') }}"
              aria-current="page"
              >Posts</a
            >
            <a class="nav-link" href="#">About</a>
          </nav>
        </div>

        <div class="flex items-center gap-2">
          <a class="btn btn-ghost btn-sm hidden sm:inline-flex" href="#"
            >Log in</a
          >
          <a class="btn btn-default btn-sm hidden sm:inline-flex" href="#"
            >Sign up</a
          >

          <div class="relative">
            <button
              id="theme-menu-trigger"
              type="button"
              class="btn btn-outline btn-icon"
              aria-expanded="false"
              aria-haspopup="true"
              aria-label="Toggle theme"
            >
              <svg
                id="theme-icon-sun"
                class="size-4 dark:hidden"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
                aria-hidden="true"
              >
                <circle cx="12" cy="12" r="4" />
                <path
                  d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
                />
              </svg>
              <svg
                id="theme-icon-moon"
                class="hidden size-4 dark:block"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
                aria-hidden="true"
              >
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
            </button>
            <div
              id="theme-menu"
              class="dropdown-content absolute right-0 mt-2 hidden w-36"
              role="menu"
            >
              <button
                class="dropdown-item"
                type="button"
                role="menuitem"
                data-theme-value="light"
              >
                <svg
                  class="mr-2 size-4"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2"
                  aria-hidden="true"
                >
                  <circle cx="12" cy="12" r="4" />
                  <path
                    d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
                  />
                </svg>
                Light
              </button>
              <button
                class="dropdown-item"
                type="button"
                role="menuitem"
                data-theme-value="dark"
              >
                <svg
                  class="mr-2 size-4"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2"
                  aria-hidden="true"
                >
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
                Dark
              </button>
              <button
                class="dropdown-item"
                type="button"
                role="menuitem"
                data-theme-value="auto"
              >
                <svg
                  class="mr-2 size-4"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2"
                  aria-hidden="true"
                >
                  <rect x="2" y="3" width="20" height="14" rx="2" />
                  <path d="M8 21h8M12 17v4" />
                </svg>
                System
              </button>
            </div>
          </div>

          <button
            id="navbar-toggle"
            type="button"
            class="btn btn-outline btn-icon md:hidden"
            aria-controls="navbar-menu"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <svg
              class="size-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          </button>
        </div>
      </div>

      <div
        id="navbar-menu"
        class="container-page hidden border-t pb-4 md:hidden"
      >
        <nav class="flex flex-col gap-1 pt-4">
          <a
            class="nav-link nav-link-active rounded-md px-3 py-2 hover:bg-accent"
            href="{{ url_for('posts.index') }}"
            >Posts</a
          >
          <a class="nav-link rounded-md px-3 py-2 hover:bg-accent" href="#"
            >About</a
          >
          <div class="separator separator-h my-2"></div>
          <a class="nav-link rounded-md px-3 py-2 hover:bg-accent" href="#"
            >Log in</a
          >
          <a class="btn btn-default mt-1" href="#">Sign up</a>
        </nav>
      </div>
    </header>

    <main role="main" class="container-page flex-1 py-10">
      {% block page_header %}{% endblock page_header %}

      <div class="grid gap-8 lg:grid-cols-[1fr_280px]">
        <div class="min-w-0">{% block content %} {% endblock content %}</div>

        <aside class="hidden lg:block">
          <div class="card sticky top-20">
            <div class="card-header">
              <h3 class="card-title">Explore</h3>
              <p class="card-description">Browse topics and updates.</p>
            </div>
            <div class="card-content">
              <ul class="space-y-1">
                <li>
                  <a
                    href="{{ url_for('posts.index') }}"
                    class="flex items-center rounded-md px-3 py-2 text-sm text-muted-foreground transition-colors hover:bg-accent hover:text-accent-foreground"
                  >
                    Latest posts
                  </a>
                </li>
                <li>
                  <a
                    href="#"
                    class="flex items-center rounded-md px-3 py-2 text-sm text-muted-foreground transition-colors hover:bg-accent hover:text-accent-foreground"
                  >
                    Announcements
                  </a>
                </li>
                <li>
                  <a
                    href="#"
                    class="flex items-center rounded-md px-3 py-2 text-sm text-muted-foreground transition-colors hover:bg-accent hover:text-accent-foreground"
                  >
                    Calendar
                  </a>
                </li>
              </ul>
            </div>
            <div class="card-footer">
              <span class="badge badge-secondary">FastAPI</span>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <footer class="border-t py-6">
      <div
        class="container-page flex flex-col items-center justify-between gap-4 sm:flex-row"
      >
        <p class="text-sm text-muted-foreground">
          © <span id="year"></span> Corey Schafer
        </p>
        <div class="flex items-center gap-4 text-sm text-muted-foreground">
          <a href="#" class="transition-colors hover:text-foreground"
            >Privacy</a
          >
          <a href="#" class="transition-colors hover:text-foreground">Terms</a>
        </div>
      </div>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
    <script src="{{ url_for('static', path='js/utils.js') }}"></script>
  </body>
</html>
